# timeshift-btrfs-sync v0.1.38 config
# Run this config on the BACKUP/DESTINATION machine.
# source.mode = "ssh" pulls from another machine over SSH.
# source.mode = "local" copies from Timeshift snapshots on this same machine and skips SSH.
# In both modes the source endpoint only needs passwordless sudo for btrfs and timeshift.

# Human-readable job name. This is only for identification.
name = "kubuntu-timeshift"

# Safe default: commands preview changes unless --run is passed.
default_dry_run = true

# If true, `sync` automatically runs destination retention pruning after a successful sync.
# Safety rule: pruning only deletes for real when the command is also run with
# both --run and --yes-delete. Without --yes-delete, the app prints the prune
# plan and refuses to delete. Keep false while testing.
prune_after_sync = false

# Optional split file logging. If blank or omitted, only terminal output is used.
# When set, the directory is created automatically and each run writes:
#   *.log = normal commands and captured command output
#   *.err = real command/pipeline error output
#   *.btrfs = btrfs send/receive status/verbose output and commands
#   *.mbuffer = mbuffer progress/summary and transfer command header
#   *.succes = readable sync/retention statistics and success mail body
log_dir = "/Backups/Kubuntu/timeshift-btrfs/.ts-btrfs-sync/logs"


# Optional internal metadata paths. Omit these to use defaults under target_root:
#   <target_root>/.ts-btrfs-sync/state.json
#   <target_root>/.ts-btrfs-sync/lock
# state_file records successfully received snapshots and incremental parent data.
# Do not manually delete state_file while a job is running. Use:
#   ts-btrfs clear-state --config ./config.toml --dry-run
#   ts-btrfs clear-state --config ./config.toml --run --i-understand-this-clears-state
# The next sync can rebuild state only from exact Btrfs UUID matches.
# lock_file prevents two sync/prune jobs from running against the same target.
# Do not manually remove a lock for a running job. Use delete-lock only for stale locks:
#   ts-btrfs delete-lock --config ./config.toml --dry-run
#   ts-btrfs delete-lock --config ./config.toml --run --i-understand-this-deletes-lock
# In real sync/prune, the lock-file parent is prepared before other sync/prune
# paths are checked. Missing lock/helper folders try Btrfs subvolume creation
# first, then mkdir fallback if Btrfs creation is not possible.
# state_file = "/Backups/Kubuntu/timeshift-btrfs/.ts-btrfs-sync/state.json"
# lock_file = "/Backups/Kubuntu/timeshift-btrfs/.ts-btrfs-sync/lock"

[mqtt]
# Optional MQTT notifications for Home Assistant or another MQTT consumer.
# This feature uses the paho-mqtt Python module. Install optional dependency with:
#   python3 -m pip install -e '.[mqtt]'
#
# If enabled = false, paho-mqtt is not required and nothing is published.
enabled = false

# MQTT broker address and port. For Home Assistant add-on broker this is often
# the HA host/IP and port 1883.
host = "homeassistant.local"
port = 1883

# Topic where JSON status messages are published.
# Home Assistant can use this topic in an MQTT sensor or automation trigger.
topic = "timeshift-btrfs-sync/kubuntu-timeshift/status"

# Optional MQTT authentication. Use either password or password_file, not both.
# username = "mqtt-user"
# password = "mqtt-password"
# password_file = "/root/.config/ts-btrfs-mqtt.password"

# Optional fixed MQTT client id. Blank/omitted creates one from the local hostname.
# client_id = "ts-btrfs-kubuntu-timeshift"

# MQTT publish options.
# qos must be 0, 1, or 2. retain=true lets Home Assistant see the last known status
# immediately after restart, but retain=false avoids stale retained status messages.
qos = 0
retain = false
timeout = 10

# Control whether success and/or failure messages are sent.
notify_on_success = true
notify_on_failure = true


[mail]
# Optional email notifications using Python standard library smtplib/email.
# No extra Python dependency is required. If enabled = false, no mail is sent.
enabled = false

# SMTP server settings. Typical STARTTLS setup uses port 587 with starttls=true.
# Typical implicit SSL setup uses port 465 with smtp_ssl=true and starttls=false.
smtp_host = "smtp.example.com"
smtp_port = 587
smtp_ssl = false
starttls = true
timeout = 10

# Optional SMTP authentication. Use either password or password_file, not both.
# username = "smtp-user@example.com"
# password = "smtp-password"
# password_file = "/root/.config/ts-btrfs-mail.password"

# Sender and recipients. to_addrs must contain at least one address when enabled=true.
from_addr = "timeshift-btrfs-sync@example.com"
to_addrs = ["admin@example.com"]

# Mail content options.
subject_prefix = "[timeshift-btrfs-sync]"
include_json = true

# Attach split run logs to the email when top-level log_dir is enabled.
# The app attaches only non-empty files that exist for this run, in this order:
#   .log, .err, .btrfs, .mbuffer, .succes
# When .succes exists and has content, its text becomes the email body.
attach_logs = true

# Optional safety cap for each attachment in bytes. 0 means no size cap.
# This can be useful if btrfs_verbose creates a very large .btrfs file.
max_attachment_bytes = 0

# Control whether success and/or failure messages are sent.
notify_on_success = true
notify_on_failure = true


[ssh]
# Used only when source.mode = "ssh". In source.mode = "local", this section may be omitted.
# Source machine containing the Timeshift snapshots.
host = "source-machine.example.lan"

# Dedicated source SSH user.
user = "ts-btrfs-sync-user"

# Optional SSH port.
# port = 22

# Recommended authentication: SSH private key.
# This adds: ssh -i /root/.ssh/timeshift-btrfs-sync ...
# The key file itself should be protected with chmod 600.
# identity_file = "/root/.ssh/timeshift-btrfs-sync"

# Optional SSH compression.
# true adds: ssh -C
# Useful over slow links; often unnecessary on fast LANs or already-compressed data.
compression = false

# Optional SSH cipher choice.
# This adds: ssh -c <cipher>
# Leave unset/blank to use OpenSSH's default cipher negotiation.
# cipher = "chacha20-poly1305@openssh.com"
# cipher = "aes128-gcm@openssh.com"

# Optional OpenSSH connection reuse. Disabled by default.
#
# What it is:
#   OpenSSH ControlMaster creates one local control socket. Later SSH commands
#   reuse that already-authenticated connection instead of unlocking the private
#   key again. This can greatly speed up encrypted keys with high KDF iterations.
#
# Security warning:
#   Anyone who can access the control socket may be able to reuse the source SSH
#   connection without the private key passphrase. Only enable this on a trusted
#   destination machine, and only with a private ControlPath directory.
#
# Safe setup when ts-btrfs runs as root:
#   control_path = "/run/ts-btrfs-ssh/%C"
# The app creates the missing ControlPath parent directory automatically with
# owner-only permissions (0700), including missing intermediate directories, if
# the user running ts-btrfs is allowed to create it. Existing directories are validated but not ownership-fixed.
#
# The app refuses control_master=true unless control_path is absolute and its
# parent directory is owned by the user running ts-btrfs, is not group/other
# accessible, and is not inside /tmp, /var/tmp, or /dev/shm.
control_master = false
control_persist = "10m"
# control_path = "/run/ts-btrfs-ssh/%C"

# Optional password authentication through sshpass on the DESTINATION machine.
# Key-based auth is safer. If password/password_file is set, remove BatchMode=yes.
# password = "your-ssh-password"
# password_file = "/root/.ssh/timeshift-btrfs-sync.password"

# Extra SSH options.
# BatchMode=yes makes SSH fail instead of hanging on prompts. Use it for key auth.
# Do NOT use BatchMode=yes together with password/password_file.
extra_args = ["-o", "BatchMode=yes"]


[manual_snapshot]
# Optional source-side Timeshift on-demand snapshot creation before a normal sync.
# When enabled = true, `sync` may create a source-side on-demand snapshot before
# normal syncing. This is a source-side change, so the app first checks that the
# current source/destination chain can actually continue. Existing destinations
# must have a UUID-confirmed sync floor and a usable incremental parent for the
# next pending transfer, or a usable parent for the future manual snapshot when
# nothing is currently pending. If this cannot be proven, the app refuses before
# creating another Timeshift snapshot. Empty destinations may start with a full
# seed. Once the safety checks pass, it creates the snapshot:
#   sudo -n timeshift --create --scripted --comments <comment>
#
# The command intentionally omits explicit --tags O. Timeshift defaults to
# on-demand/tag O when no tag is supplied, and some Timeshift versions reject
# explicit --tags O even though the help text lists O as valid.
# After creation, the app re-reads timeshift --list. The new snapshot is not
# sent directly or prioritized; it is sent only when the normal oldest-to-newest
# sync loop reaches its timestamp.
#
# Interrupted-run safety: if a previous run created an app on-demand snapshot and
# failed before it was fully synced, the next normal sync detects that pending
# app snapshot by tag O plus marker and keeps it in normal oldest-to-newest
# order. It still creates a fresh on-demand snapshot for the current run because
# the older pending snapshot may no longer represent the current system state.
# Dry-run only prints what would happen. If --snapshot is used, automatic
# creation is skipped because that command is a targeted sync.
enabled = true

# Independent cleanup for app-created on-demand snapshots.
# This only affects tag O snapshots whose saved Timeshift comment contains marker.
# It does not affect normal/user-created Timeshift on-demand snapshots.
# Real deletion still requires prune to run with --run --yes-delete.
cleanup_enabled = true

# Comment passed to Timeshift. Keep the marker text inside the comment so the
# destination prune logic can recognize snapshots created by this app.
comment = "ts-btrfs-sync automatic on-demand snapshot"
marker = "ts-btrfs-sync"

# Destination retention for app-created on-demand snapshots recognized by marker.
# Default 10. This is independent from [retention].ondemand.
# Set 0 to delete all matching app-created snapshots except globally protected
# snapshots/newest common parent. Set cleanup_enabled = false to keep them all.
retention_count = 10

# Sync path preflight:
# Before automatic/manual on-demand snapshot creation and before any send/receive
# work, the app verifies source.snapshot_root, source.cache_root policy, and
# destination.target_root. In SSH mode source checks run through the configured
# SSH/sshpass source endpoint; in local mode they run locally.
# source.snapshot_root is Timeshift-owned: it must already exist, may be an
# ordinary directory on Btrfs, and is never created, pruned, deleted, destroyed,
# or cleaned by this app. source.cache_root may already exist as a Btrfs
# subvolume, or if create_readonly_cache = true it may be missing as long as
# its parent is Btrfs-accessible; real preflight creates it as a Btrfs subvolume.
# source.cache_root is not created unless source.snapshot_root has already been
# verified on the source endpoint.
# If destination.target_root is missing and create_target_root = true, real
# preflight creates it as a Btrfs subvolume too. If it already exists, it must
# pass `btrfs subvolume show`; a plain directory inside Btrfs is refused.
#
[source]
# Source command mode.
#   "ssh"   = run source commands through the configured [ssh] connection.
#   "local" = run source commands on this same machine and skip SSH entirely.
# Local mode keeps the same sync, parent-UUID, read-only cache, manual snapshot,
# and retention safety rules; only the command transport changes.
mode = "ssh"

# Source-side command prefix. sudo -n means sudo must not prompt for a password.
sudo = "sudo -n"

# Source-side commands. Absolute paths are also valid, for example /usr/bin/btrfs.
btrfs_command = "btrfs"
timeshift_command = "timeshift"

# Snapshot discovery command:
#   sudo -n timeshift --list
# This directory belongs to Timeshift and must already exist. It may be a
# normal directory on a Btrfs filesystem because Timeshift creates snapshot
# subvolumes inside it. The app never creates source.snapshot_root and must
# never prune, delete, destroy, or clean source.snapshot_root or anything below it.
# In SSH mode this path is checked on the remote source through SSH/sshpass,
# not on the local destination.
# The app parses snapshot names from Timeshift output, then constructs paths as:
#   snapshot_root/<snapshot-name>/<subvolume>
snapshot_root = "/timeshift-btrfs/snapshots"

# Subvolumes expected inside each Timeshift snapshot.
subvolumes = ["@", "@home"]

# Speed option. Default false is fast: discovery does NOT run btrfs subvolume show
# for every snapshot/subvolume. It trusts the configured naming layout and only
# checks Btrfs metadata when a subvolume is actually going to be sent.
# Set true if you want list-source/sync discovery to verify every subvolume up front.
verify_subvolumes_at_discovery = false

# Incremental parent verification is mandatory and no longer configurable.
# Before using an existing destination snapshot as an incremental parent, the app
# compares current source Btrfs UUID metadata with destination `received_uuid`
# metadata. Parent mismatch is always a hard error.

# Performance/safety balance for the current run only. Parent paths from previous
# runs are always checked against destination received_uuid before use. When true,
# a source send_path that was just successfully sent and received by this same
# process can be reused as the next incremental parent without re-reading Btrfs
# metadata. This never allows creating a replacement parent cache snapshot.
verify_incremental_parent_once_per_run = true

# Source-side read-only cache for writable Timeshift snapshots.
# If cache_root is missing, real preflight creates cache_root itself as a Btrfs
# subvolume. The parent directory of cache_root must already exist and be
# Btrfs-accessible.
# cache_root must be outside snapshot_root. Do not point it at the Timeshift
# snapshots directory. An existing cache_root path must be a Btrfs subvolume,
# not an ordinary folder.
# The app creates cache paths with btrfs, not mkdir:
#   sudo -n btrfs subvolume create <cache_root>
#   sudo -n btrfs subvolume create <cache_root>/<snapshot-name>
# Read-only send snapshots are then created with:
#   sudo -n btrfs subvolume snapshot -r <original> <cache_root>/<snapshot>/<subvolume>
# If that exact cache snapshot already exists, the app verifies it is a
# read-only Btrfs subvolume with matching parent identity and reuses it instead
# of trying to recreate it.
# destroy-leftovers checks cache_root with configured sudo+Btrfs before relying
# on source-shell `test -e`, so the source user does not need ordinary directory
# traversal permission just to prove the app-owned cache subvolume exists.
cache_root = "/timeshift-btrfs/.ts-btrfs-sync/send-cache"
create_readonly_cache = true

# Source send-cache cleanup. Keep true. The historical option name is kept for
# config compatibility, but send-cache cleanup is now retention-based, not
# immediate superseded-parent cleanup. `sync` keeps every read-only cache
# snapshot it creates. Later, when `prune` deletes a destination snapshot by the
# normal retention plan, it also deletes that snapshot's matching source
# send-cache subvolumes with:
#   sudo -n btrfs subvolume delete <cache-subvolume>
# Safety invariant: source.snapshot_root and all Timeshift snapshots below it
# are never delete candidates. Only paths inside source.cache_root may be cleaned.
# The timestamp cache parent <cache_root>/<snapshot-name> is deleted only after
# a final live `btrfs subvolume list -o <cache_root>/<snapshot-name>` check and
# cleanup confirms no cached child subvolumes remain below it. If Btrfs left
# empty ordinary mountpoint directories behind after child deletion, the app
# tries to remove only those empty directories with non-sudo `rmdir` before
# retrying the parent Btrfs delete. It never uses source-side sudo rm/find.
cleanup_superseded_cache = true

# Optional Btrfs send compressed-data mode.
# true adds: btrfs send --compressed-data
# This preserves already-compressed source extents when supported.
# Destination compression is intentionally not configured by this app.
# If you want compressed destination storage, mount the receiving Btrfs
# filesystem/subvolume with compression enabled, for example compress=zstd
# or compress=zstd:<level>, before running this app.
send_compressed_data = true

# Optional Btrfs send protocol version.
# Example: send_proto = 2 adds: btrfs send --proto 2
# send_proto = 2

[destination]
# Local Btrfs backup root on the BACKUP/DESTINATION machine.
#
# The destination target root is the backup job root. If this exact path is
# missing and create_target_root = true, real preflight creates it as a Btrfs
# subvolume with:
#   sudo -n btrfs subvolume create <target_root>
# The parent directory of target_root must already exist and be Btrfs-accessible.
# Existing target_root paths are not converted; they must already be Btrfs
# subvolumes. Plain directories inside Btrfs are refused.
#
# The app creates helper paths inside this target_root:
#   snapshots/       = received Btrfs backup snapshots
#   .ts-btrfs-sync/ = app state.json, lock file, logs
# These helper paths may be Btrfs subvolumes or ordinary directories. Missing
# helpers try `btrfs subvolume create` first, then mkdir fallback.
#
# If you completely reset/start over with a new full sync, clean both folders.
# Do not delete only .ts-btrfs-sync/state.json while leaving old snapshots/.
# Received @ and @home entries are Btrfs subvolumes, so delete those with
# `btrfs subvolume delete` before removing the ordinary folders.
# If you are retiring this app setup entirely, use the dangerous explicit command:
#   ts-btrfs destroy-leftovers --config ./config.toml --delete-both --dry-run
# Real deletion additionally requires --run, --i-understand-this-destroys-data,
# and two typed confirmations.
target_root = "/Backups/Kubuntu/timeshift-btrfs"

# Local sudo prefix for btrfs receive/delete/show commands.
sudo = "sudo -n"
btrfs_command = "btrfs"

# Whether the app may create target_root and internal metadata directories.
# Missing target_root is created as a Btrfs subvolume, not as a normal directory.
create_target_root = true

# Interrupted receive cleanup. Keep true. If a previous transfer was cancelled
# and left a partial destination subvolume that is not in state.json, the app
# deletes that incomplete Btrfs subvolume and retries the receive. It only
# deletes paths that are Btrfs subvolumes or empty directories; non-empty normal
# directories still require manual inspection.
cleanup_incomplete_receive = true


[stream]
# Optional mbuffer between source send and local receive.
# SSH mode false pipeline:
#   ssh source 'btrfs send ...' | btrfs receive ...
# Local mode false pipeline:
#   sh -c 'btrfs send ...' | btrfs receive ...
# With mbuffer:
#   <source send> | mbuffer -m 256M | btrfs receive ...
use_mbuffer = true

# mbuffer command and memory buffer size.
mbuffer_command = "mbuffer"
mbuffer_size = "256M"

# Optional mbuffer rate limit. Example: "100M" adds `mbuffer -R 100M`.
# mbuffer_rate = "100M"

# Optional extra mbuffer arguments as a TOML string list.
mbuffer_extra_args = []

# Optional Btrfs verbose output.
# This adds -v to both:
#   btrfs send -v ...
#   btrfs receive -v ...
# Btrfs verbose mode prints operation/details, not a clean percent progress bar.
# mbuffer is still the useful throughput/total progress display.
btrfs_verbose = false

[retention]
# Destination retention counts by Timeshift tag.
# H=hourly, D=daily, W=weekly, M=monthly, B=boot, O=on-demand/manual.
#
# These rules are used by:
#   ts-btrfs prune --config ./config.toml --dry-run
#   ts-btrfs prune --config ./config.toml --run --yes-delete
#   ts-btrfs sync  --config ./config.toml --run --prune --yes-delete
#
# Important: `prune_after_sync = true` or `--prune` only enables the prune step.
# Real deletion still requires `--run --yes-delete`.
hourly = 36
daily = 7
weekly = 4
monthly = 12
boot = 5
# Retention count for normal/user-created Timeshift on-demand snapshots.
# This is ignored unless cleanup_ondemand = true.
ondemand = 10

# Cleanup switch for normal/user-created Timeshift tag O snapshots.
# Default false means your normal manual on-demand snapshots are never pruned by
# this app unless you explicitly allow it. App-created on-demand cleanup is
# controlled independently by [manual_snapshot].cleanup_enabled.
cleanup_ondemand = false


# Extra safety: always keep newest snapshot and latest likely incremental parent.
keep_latest = true
keep_latest_common_parent = true

# Names listed here are never pruned.
protected_snapshots = []
