# timeshift-btrfs-sync v0.3.1 minimal-source-sudo config
# Run this app on the BACKUP/DESTINATION machine.

name = "kubuntu-timeshift"
default_dry_run = true
prune_after_sync = false

[ssh]
host = "source-machine.example.lan"
user = "btrbk-source"
# port = 22
# identity_file = "/root/.ssh/timeshift-btrfs-sync"
extra_args = ["-o", "BatchMode=yes"]

[source]
# Source-side passwordless sudo should be limited to these two commands only:
#   sudo -n timeshift ...
#   sudo -n btrfs ...
# No source-side helper script is installed. The app does not use source-side
# sudo mkdir, sudo cat, sudo python, sudo find, or sudo shell scripts.
sudo = "sudo -n"
btrfs_command = "btrfs"
timeshift_command = "timeshift"

# The app discovers snapshot names/tags from `sudo -n timeshift --list`, then
# constructs subvolume paths as: snapshot_root/<snapshot-name>/<subvolume>
snapshot_root = "/timeshift-btrfs/snapshots"
subvolumes = ["@", "@home"]

# Optional read-only send cache for writable source snapshots.
# Only this top-level cache_root must be created manually once on the source.
# Per-snapshot cache folders are created with `btrfs subvolume create`, not mkdir,
# so source-side sudo is still limited to btrfs/timeshift only.
# Resulting layout:
#   <cache_root>/2026-06-22_18-00-01/@
#   <cache_root>/2026-06-22_18-00-01/@home
cache_root = "/timeshift-btrfs/.ts-btrfs-sync/send-cache"
create_readonly_cache = true

[destination]
target_root = "/Backups/Kubuntu/timeshift-btrfs"
sudo = "sudo -n"
create_target_root = true

[retention]
hourly = 6
daily = 7
weekly = 4
monthly = 6
boot = 5
ondemand = 10
yearly = 0
keep_latest = true
keep_latest_common_parent = true
protected_snapshots = []
