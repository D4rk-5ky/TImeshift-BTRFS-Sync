# timeshift-btrfs-sync destination-pull config
#
# This file is read by the backup/destination machine. The destination connects
# to the source over SSH, asks the source for Timeshift snapshots, then receives
# missing Btrfs subvolumes into target_root.

# Human-readable name for this backup job.
name = "kubuntu-timeshift"

# Safe default: preview actions unless --run is given.
default_dry_run = true

# If true, `sync` will automatically run retention pruning after a successful
# sync pass. Keep false while testing.
prune_after_sync = false

[ssh]
# Source machine to connect to.
host = "source-machine.example.lan"

# Remote SSH user on the source. This user needs permission to run btrfs and
# timeshift through sudo, unless source.sudo is set to "".
user = "btrbk-source"

# Optional SSH port and key.
# port = 22
# identity_file = "/root/.ssh/timeshift-btrfs-sync"

# Extra ssh options. BatchMode=yes prevents password prompts from hanging a
# systemd timer.
extra_args = ["-o", "BatchMode=yes"]

[source]
# Timeshift Btrfs snapshot root on the SOURCE machine.
# Common examples:
#   /timeshift-btrfs/snapshots
#   /run/timeshift/backup/timeshift-btrfs/snapshots
snapshot_root = "/timeshift-btrfs/snapshots"

# App-managed read-only cache on the SOURCE if original snapshots are writable.
# If omitted, this defaults to: <parent-of-snapshot_root>/.ts-btrfs-sync/send-cache
# cache_root = "/timeshift-btrfs/.ts-btrfs-sync/send-cache"

# Subvolumes expected inside each Timeshift snapshot. Timeshift usually stores
# @ and sometimes @home, depending on your layout.
subvolumes = ["@", "@home"]

# Remote sudo command. Use "sudo -n" so the app fails instead of prompting.
# Use "" if the SSH user can run btrfs/timeshift directly without sudo.
sudo = "sudo -n"

# Timeshift command name/path on the source.
timeshift_command = "timeshift"

[destination]
# Local Btrfs backup root on the BACKUP/DESTINATION machine. Received snapshots
# will be stored under: <target_root>/snapshots/<snapshot-name>/
target_root = "/Backups/Kubuntu/timeshift-btrfs"

# Local sudo command for btrfs receive/delete.
sudo = "sudo -n"

# Create target_root automatically if missing.
create_target_root = true

[retention]
# Keep the newest N snapshots for each Timeshift tag on the destination.
# H=hourly, D=daily, W=weekly, M=monthly, B=boot, O=on-demand/manual.
hourly = 6
daily = 7
weekly = 4
monthly = 6
boot = 5
ondemand = 10

# Optional extension. Yearly is not native Timeshift behavior.
yearly = 0

# Extra safety: always keep the newest synced snapshot.
keep_latest = true

# Extra safety: keep the newest synced snapshot as a likely future incremental
# parent, so the next run is less likely to need a full send.
keep_latest_common_parent = true

# Snapshots listed here are never deleted by prune.
protected_snapshots = []
